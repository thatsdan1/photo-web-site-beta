<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThroughDansLens</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <!--NavBar Section-->
    <nav class="navbar">
        <div class="navbar__container">
            <a href="index.html" id="navbar__logo">ThroughDansLens</a>
            <div class="navbar__toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <ul class="navbar__menu">
                <li class="navbar__item">
                    <a href="index.html" class="navbar__links">Home</a>
                </li>
                <li class="navbar__item">
                    <a href="book.html" class="navbar__links">Book</a>
                </li>
                <li class="navbar__item">
                    <a href="faq.html" class="navbar__links">FAQ</a>
                </li>
                <li class="navbar__item">
                    <a href="gallery.html" class="navbar__links">Gallery</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Home section -->
    <div class="home">
        <div class="home__container">
            <h1><span class="highlight">Fresh Prince</span></h1>

            <!-- Photo Gallery - Fresh Prince -->
            <div class="gallery">
                <div class="gallery__item">
                    <img src="images/freshpr.jpg" alt="Fresh Prince">
                </div>
                <div class="gallery__item">
                    <img src="images/fp1.jpg" alt="Fresh Prince Image 1">
                </div>
                <div class="gallery__item">
                    <img src="images/fp3.jpg" alt="Fresh Prince Image 2">
                </div>
                <div class="gallery__item">
                    <img src="images/freshprince 1.jpg" alt="Fresh Prince Image 3">
                </div>
                <div class="gallery__item">
                    <img src="images/freshprince middle .jpg" alt="Fresh Prince Image 4">
                </div>
                <div class="gallery__item">
                    <img src="images/fp2.jpg" alt="Fresh Prince Image 5">
                </div>
            </div>
        </div>
    </div>

    <!-- New Section - Heist Prince -->
    <div class="home">
        <div class="home__container">
            <h1><span class="highlight">Heist Shoot</span></h1>

            <!-- Photo Gallery - Heist Prince -->
            <div class="gallery">
                <div class="gallery__item">
                    <img src="images/h1.jpg" alt="Heist Prince Image 1">
                </div>
                <div class="gallery__item">
                    <img src="images/h2.jpg" alt="Heist Prince Image 2">
                </div>
                <div class="gallery__item">
                    <img src="images/h3.jpg" alt="Heist Prince Image 3">
                </div>
                <div class="gallery__item">
                    <img src="images/h5.jpg" alt="Heist Prince Image 4">
                </div>
                <div class="gallery__item">
                    <img src="images/h4.jpg" alt="Heist Prince Image 5">
                </div>
                <div class="gallery__item">
                    <img src="images/h6.jpg" alt="Heist Prince Image 6">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
